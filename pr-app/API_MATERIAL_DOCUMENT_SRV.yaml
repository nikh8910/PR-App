openapi: 3.0.0
info:
  title: Material Documents - Read, Create
  version: 1.4.0
  description: This service enables you to retrieve and create material documents, for example, to post a goods receipt for a purchase order or to document the transfer of materials between two storage locations. Additionally, the service allows you to cancel existing material documents or single items. It can be consumed by external systems and user interfaces.
externalDocs:
  description: Business Documentation
  url: https://help.sap.com/http.svc/ahp2/SAP_S4HANA_CLOUD/2602.latest/EN/d4/c919581bc30a02e10000000a44147b/frameset.htm
x-sap-api-type: ODATA
x-sap-shortText: Use this synchronous inbound service to read and create material documents
x-sap-software-min-version: '2602'
x-sap-ext-overview:
- name: Communication Scenario
  values:
  - text: Material Document Integration (SAP_COM_0108)
    format: plain
- name: Scope Items
  values:
  - text: '[Core Inventory Management (BMC)](https://me.sap.com/processnavigator/SolP/BMC " Link To BP ")'
    format: markdown
  - text: '[Core Inventory Management (OMC)](https://me.sap.com/processnavigator/SolP/OMC " Link To BP ")'
    format: markdown
- name: Authentication Methods
  values:
  - text: x509
    format: plain
- name: Business Object
  values:
  - text: Material Document
    format: plain
servers:
- url: https://{host}:{port}/sap/opu/odata/sap/API_MATERIAL_DOCUMENT_SRV
  variables:
    host:
      default: ''
    port:
      default: ''
- url: https://sandbox.api.sap.com/s4hanacloud/sap/opu/odata/sap/API_MATERIAL_DOCUMENT_SRV
x-sap-extensible:
  supported: manual
  description: "If you are working with key user extensibility, the API can be extended by custom fields on the following business contexts (field usage for this API needs to be selected):\r\n* Accounting: Coding Block (FINS_CODING_BLOCK)\r\n* Inventory Management: Material Document Item (MATERIALDOCUMENTITEM)\r\n\r\n[How to add an extension field to an API](https://help.sap.com/docs/SAP_S4HANA_CLOUD/0f69f8fb28ac4bf48d2b57b9637e81fa/ce819b8557194ae0aa180ba4ac6a04de.html)"
