  /Cancel:
    post:
      summary: Cancels a material document
      description: Cancels a complete material document that you specify by the material document number and year.
      tags:
      - Document Header
      parameters:
      - name: MaterialDocumentYear
        in: query
        required: true
        description: "Material Doc. Year  \n(Value needs to be enclosed in single quotes)"
        schema:
          type: string
          maxLength: 6
          pattern: ^'[^']*(''[^']*)*'$
      - name: MaterialDocument
        in: query
        required: true
        description: "Material Document  \n(Value needs to be enclosed in single quotes)"
        schema:
          type: string
          maxLength: 12
          pattern: ^'[^']*(''[^']*)*'$
      - name: PostingDate
        in: query
        description: "Posting Date  \n(Value needs to be enclosed in single quotes and prefixed with `datetime`, e.g. `datetime'2017-12-31T00:00'`)"
        schema:
          type: string
          nullable: true
          pattern: ^datetime'[0-9]{4}-[0-9]{2}-[0-9]{2}T00:00'$
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                title: A_MaterialDocumentHeaderType
                type: object
                properties:
                  d:
                    $ref: '#/components/schemas/API_MATERIAL_DOCUMENT_SRV.A_MaterialDocumentHeaderType'
        4XX:
          $ref: '#/components/responses/error'
