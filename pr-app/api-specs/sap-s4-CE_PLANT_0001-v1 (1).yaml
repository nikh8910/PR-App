openapi: 3.0.0
info:
  title: Plant Configuration
  version: 1.0.1
  description: This service enables you to retrieve plant configuration information using the OData protocol with filter data provided in the payload.
externalDocs:
  description: Business Documentation
  url: https://help.sap.com/http.svc/ahp2/SAP_S4HANA_CLOUD/2602.latest/EN/0f/c562d008b64acc8d57170ab718b9f0/frameset.htm
x-sap-api-type: ODATAV4
x-sap-shortText: Use this synchronous inbound service to read plant configuration information
x-sap-software-min-version: '2602'
x-sap-ext-overview:
- name: Communication Scenario
  values:
  - text: Material Document Integration (SAP_COM_0108)
    format: plain
  - text: IC Configure - Variant Configuration Bundle Model Integration (SAP_COM_0932)
    format: plain
- name: Scope Items
  values:
  - text: '[Core Inventory Management (BMC)](https://me.sap.com/processnavigator/SolP/BMC " Link To BP ")'
    format: markdown
  - text: '[Core Inventory Management (OMC)](https://me.sap.com/processnavigator/SolP/OMC " Link To BP ")'
    format: markdown
  - text: '[Set Up Advanced Solution Bundle - NO SUCCESSOR (6W9)](https://me.sap.com/processnavigator/SolP/6W9 " Link To BP ")'
    format: markdown
- name: Authentication Methods
  values:
  - text: x509
    format: plain
- name: Service Group Name
  values:
  - text: API_PLANT_2
    format: plain
- name: Business Object
  values:
  - text: Plant
    format: plain
servers:
- url: https://{host}:{port}/sap/opu/odata4/sap/api_plant_2/srvd_a2x/sap/plant/0001
  variables:
    host:
      default: ''
    port:
      default: ''
- url: https://sandbox.api.sap.com/s4hanacloud/sap/opu/odata4/sap/api_plant_2/srvd_a2x/sap/plant/0001
x-sap-extensible:
  supported: 'no'
tags:
- name: Plant
