        description: Order items by property values, see [Sorting](http://docs.oasis-open.org/odata/odata/v4.01/odata-v4.01-part1-protocol.html#sec_SystemQueryOptionorderby)
        explode: false
        schema:
          type: array
          uniqueItems: true
          items:
            type: string
            enum:
            - Plant
            - Plant desc
            - PlantName
            - PlantName desc
            - ValuationArea
            - ValuationArea desc
            - PlantCustomer
            - PlantCustomer desc
            - PlantSupplier
            - PlantSupplier desc
            - FactoryCalendar
            - FactoryCalendar desc
            - DefaultPurchasingOrganization
            - DefaultPurchasingOrganization desc
            - SalesOrganization
            - SalesOrganization desc
            - AddressID
            - AddressID desc
            - PlantCategory
            - PlantCategory desc
            - DistributionChannel
            - DistributionChannel desc
            - Division
            - Division desc
            - Language
            - Language desc
            - IsMarkedForArchiving
            - IsMarkedForArchiving desc
      - name: $select
        in: query
        description: Select properties to be returned, see [Select](http://docs.oasis-open.org/odata/odata/v4.01/odata-v4.01-part1-protocol.html#sec_SystemQueryOptionselect)
        explode: false
        schema:
          type: array
          uniqueItems: true
          items:
            type: string
            enum:
            - Plant
            - PlantName
            - ValuationArea
            - PlantCustomer
            - PlantSupplier
            - FactoryCalendar
            - DefaultPurchasingOrganization
            - SalesOrganization
            - AddressID
            - PlantCategory
            - DistributionChannel
            - Division
            - Language
            - IsMarkedForArchiving
      responses:
        '200':
          description: Retrieved entities
          content:
            application/json:
              schema:
                title: Collection of PlantType
                type: object
                properties:
                  '@odata.count':
                    $ref: '#/components/schemas/count'
                  value:
                    type: array
                    items:
                      $ref: '#/components/schemas/com.sap.gateway.srvd_a2x.api_plant_2.v0001.PlantType'
        4XX:
          $ref: '#/components/responses/error'
  /Plant/{Plant}:
    parameters:
    - name: Plant
      in: path
      required: true
      description: Plant
      schema:
        type: string
        maxLength: 4
    get:
      summary: Get entity from Plant by key
      tags:
      - Plant
      parameters:
      - name: $select
        in: query
        description: Select properties to be returned, see [Select](http://docs.oasis-open.org/odata/odata/v4.01/odata-v4.01-part1-protocol.html#sec_SystemQueryOptionselect)
        explode: false
        schema:
          type: array
          uniqueItems: true
          items:
            type: string
            enum:
            - Plant
            - PlantName
            - ValuationArea
            - PlantCustomer
            - PlantSupplier
            - FactoryCalendar
            - DefaultPurchasingOrganization
            - SalesOrganization
            - AddressID
            - PlantCategory
            - DistributionChannel
            - Division
            - Language
            - IsMarkedForArchiving
      responses:
        '200':
          description: Retrieved entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/com.sap.gateway.srvd_a2x.api_plant_2.v0001.PlantType'
        4XX:
          $ref: '#/components/responses/error'
  /$batch:
    post:
      summary: Send a group of requests
      description: |-
        Group multiple requests into a single request payload, see [Batch Requests](http://docs.oasis-open.org/odata/odata/v4.01/odata-v4.01-part1-protocol.html#sec_BatchRequests).

        *Please note that "Try it out" is not supported for this request.*
      tags:
      - Batch Requests
      requestBody:
        required: true
        description: Batch request
        content:
          multipart/mixed;boundary=request-separator:
            schema:
              type: string
            example: |-
              --request-separator
              Content-Type: application/http
              Content-Transfer-Encoding: binary

              GET Plant HTTP/1.1
              Accept: application/json


              --request-separator--
      responses:
        '200':
          description: Batch response
          content:
            multipart/mixed:
              schema:
                type: string
              example: |-
                --response-separator
                Content-Type: application/http

                HTTP/1.1 200 OK
                Content-Type: application/json

                {...}
                --response-separator--
        4XX:
          $ref: '#/components/responses/error'
